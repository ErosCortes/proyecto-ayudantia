<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Ayudantías UCN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --ucn-azul: #003057;
      --ucn-celeste: #00AEEF;
      --ucn-gris: #F4F4F4;
    }
  </style>
</head>
<body class="bg-[var(--ucn-gris)] font-sans flex">

  <!-- Sidebar izquierda -->
  <aside class="w-64 bg-[var(--ucn-azul)] text-white min-h-screen p-6 flex flex-col gap-6">
    <h2 class="text-2xl font-bold">Acceso</h2>

    <button class="bg-[var(--ucn-celeste)] py-3 rounded-xl font-semibold hover:opacity-80">
      Ingresar como Estudiante
    </button>

    <button class="bg-white text-[var(--ucn-azul)] py-3 rounded-xl font-semibold hover:opacity-80">
      Ingresar como Profesor
    </button>

    <a href="encuesta.html" class="mt-4 bg-green-500 text-white py-3 text-center rounded-xl font-semibold hover:opacity-80">
      Postular
    </a>
  </aside>

  <!-- Contenido principal -->
  <div class="flex-1">

    <!-- Navbar -->
    <header class="bg-[var(--ucn-azul)] text-white shadow-lg">
      <nav class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <section class="flex items-center gap-3">
          <img src="logo70azul.png" alt="UCN" class="h-16">
          <h1 class="text-xl font-bold">Ayudantías UCN</h1>
        </section>

        <ul class="hidden md:flex gap-6">
          <li><a href="#" class="hover:text-[var(--ucn-celeste)]">Inicio</a></li>
          <li><a href="#" class="hover:text-[var(--ucn-celeste)]">Cursos</a></li>
          <li><a href="#" class="hover:text-[var(--ucn-celeste)]">Calendario</a></li>
          <li><a href="#" class="hover:text-[var(--ucn-celeste)]">Material</a></li>
          <li><a href="#" class="hover:text-[var(--ucn-celeste)]">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <!-- Hero -->
    <main>
      <section class="bg-white py-16 text-center">
        <h2 class="text-4xl md:text-5xl font-bold text-[var(--ucn-azul)]">
          Portal de Ayudantías
        </h2>
        <p class="mt-4 text-gray-600 text-lg">
          Encuentra horarios, materiales y apoyo académico en un solo lugar.
        </p>
        <button class="mt-6 bg-[var(--ucn-celeste)] text-white px-6 py-3 rounded-2xl text-lg shadow hover:scale-105 transition">
          Ver ayudantías
</html>
