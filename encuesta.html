<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postulación Ayudantías</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <form class="bg-white p-8 rounded-2xl shadow-md w-full max-w-lg">
    <h2 class="text-2xl font-bold mb-6 text-center">Postulación a Ayudantía</h2>

    <label class="block mb-2">Nombre</label>
    <input type="text" class="w-full mb-4 p-2 border rounded">

    <label class="block mb-2">Correo</label>
    <input type="email" class="w-full mb-4 p-2 border rounded">

    <label class="block mb-2">Carrera</label>
    <input type="text" class="w-full mb-4 p-2 border rounded">

    <label class="block mb-2">Curso al que postula</label>
    <input type="text" class="w-full mb-4 p-2 border rounded">

    <label class="block mb-2">Motivación</label>
    <textarea class="w-full mb-4 p-2 border rounded"></textarea>

    <button class="w-full bg-blue-600 text-white py-2 rounded-xl hover:opacity-80">
      Enviar Postulación
    </button>

    <a href="index.html" class="block text-center mt-4 text-blue-500">Volver</a>
  </form>

</body>
</html>
